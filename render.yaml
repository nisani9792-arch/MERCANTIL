services:
  - type: web
    name: mercantil
    runtime: node
    plan: free
    healthCheckPath: /api/health
    buildCommand: npm ci && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: HOSTNAME
        value: "0.0.0.0"
      - key: DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: APP_PIN
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.0-flash
